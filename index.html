<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Тестовое задание Ozon 2026.04</title>
  </head>
  <body>
    <main>
      <div class="container">
        <div class="progress-demo">
          <h1 class="progress-demo__label">Progress</h1>
          <div class="progress-demo__content">
            <div class="progress-demo__progress-wrapper">
              <div class="progress"></div>
            </div>
            <div class="progress-demo__controls controls">
              <div class="controls__block">
                <label class="controls__el">
                  <input type="text" name="progress-value" value="60" class="controls__el-input input-text">
                  <span class="controls__el-text">
                    Value
                  </span>
                </label>
              </div>
              <div class="controls__block">
                <label class="controls__el">
                  <div class="controls__el-input input-checkbox">
                    <input type="checkbox" name="progress-animate" class="input-checkbox__input">
                  </div>

                  <span class="controls__el-text">
                    Animate
                  </span>
                </label>
              </div>
              <div class="controls__block">
                <label class="controls__el">
                  <div class="controls__el-input input-checkbox input-checkbox_active">
                    <input type="checkbox" name="progress-hide" class="input-checkbox__input">
                  </div>

                  <span class="controls__el-text">
                    Hide
                  </span>
                </label>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
